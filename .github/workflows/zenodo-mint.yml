# Manual, gated Zenodo minting. NEVER runs on push/release — minting permanent
# DOIs must be an explicit human action. Requires repo secrets:
#   ZENODO_SANDBOX_TOKEN  (sandbox.zenodo.org token)
#   ZENODO_TOKEN          (production zenodo.org token — only for env=production)
# Production also requires Zenodo bulk-mint permission + a locked license first.
name: Zenodo mint (manual)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target Zenodo environment"
        type: choice
        options: [sandbox, production]
        default: sandbox
      limit:
        description: "Max entries to process (blank = all)"
        required: false
      only:
        description: "Comma-separated slugs (blank = all eligible)"
        required: false

permissions:
  contents: write # to commit the updated DOI map

# Share a concurrency group with the auto sandbox-refresh (zenodo-sandbox-refresh.yml)
# so a manual sandbox mint and the auto-refresh never run at once against the same
# sandbox state + map; production gets its own group.
concurrency:
  group: ${{ inputs.env == 'production' && 'zenodo-prod' || 'zenodo-sandbox' }}
  cancel-in-progress: false

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          chrome-version: stable
      - name: Build (emits dist/zenodo-meta.json + entry pages)
        run: pnpm run build
      - name: Mint
        # Inputs are passed via env (NOT interpolated into the script body) so
        # free-text workflow_dispatch inputs can't inject shell commands.
        env:
          ZENODO_ENV: ${{ inputs.env }}
          MINT_LIMIT: ${{ inputs.limit }}
          MINT_ONLY: ${{ inputs.only }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          ZENODO_TOKEN: ${{ inputs.env == 'production' && secrets.ZENODO_TOKEN || secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          ARGS="--env $ZENODO_ENV"
          [ "$ZENODO_ENV" = "production" ] && ARGS="$ARGS --yes-production"
          [ -n "$MINT_LIMIT" ] && ARGS="$ARGS --limit $MINT_LIMIT"
          [ -n "$MINT_ONLY" ] && ARGS="$ARGS --only $MINT_ONLY"
          node scripts/zenodo-mint.ts $ARGS
      - name: Commit DOI map
        # The production map is always tracked; the sandbox map is currently also
        # committed (temporarily, for the client demo — issue #2). Stage both;
        # only the map that changed for this env actually gets committed.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/zenodo-dois.json src/data/zenodo-dois.sandbox.json
          git commit -m "chore(zenodo): update DOI map [skip ci]" || echo "no changes to commit"
          git push
