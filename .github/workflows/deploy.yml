name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Astro
        run: pnpm run build

      # Headless Chrome to render each entry's downloadable PDF (with the
      # per-page footer) straight into dist/entries/<slug>.pdf, so the on-site
      # "Download (PDF)" button resolves. Same provisioning as zenodo-mint.yml.
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      # Persist rendered PDFs across deploys. The render script (pnpm pdfs:site)
      # re-renders only entries whose built index.html hash changed and copies
      # the rest from this cache, so a content edit re-renders one PDF and an
      # unrelated change re-renders none. restore-keys pulls the most recent
      # cache; a new one is saved per commit SHA.
      - name: Cache rendered entry PDFs
        uses: actions/cache@v4
        with:
          path: .pdf-cache
          key: pdf-cache-v2-${{ github.sha }}
          restore-keys: |
            pdf-cache-v2-

      - name: Render entry PDFs into dist/entries
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: pnpm run pdfs:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
